# 开发环境配置
# 复制为 local.yaml 并修改实际值

database:
  postgresql:
    host: localhost
    port: 5432
    database: geoai_db
    username: postgres
    password: postgres
    pool_size: 10
    max_overflow: 20

  mysql:
    host: localhost
    port: 3306
    database: disaster_knowledge
    username: root
    password: root
    charset: utf8mb4

ai:
  zhipuai:
    api_key: "your_zhipuai_api_key_here"
    embedding_model: "embedding-3"
    vector_dimension: 2048
    timeout: 30
    max_retries: 3

  llm:
    model: "glm-4"
    temperature: 0.1
    max_tokens: 2000

processing:
  chunk_size: 500
  chunk_overlap: 50
  headers_to_split_on:
    - ["#", "Header 1"]
    - ["##", "Header 2"]
    - ["###", "Header 3"]

  archives:
    supported_extensions: [".zip", ".rar", ".7z"]
    force_extract: false
    delete_after_extract: false
    recursive_extract: true

paths:
  data_dir: "./data"
  raw_data: "./data/raw"
  processed_data: "./data/processed"
  external_data: "./data/external"
  logs_dir: "./logs"
  compressed_dir: "D:/work/shixi/py/md_output"  # Windows路径，根据实际情况修改

logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/geoai_dev.log"
  max_size_mb: 100
  backup_count: 5

server:
  host: "0.0.0.0"
  port: 8000
  debug: true
  reload: true
  workers: 1

security:
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  api_key_header: "X-API-Key"
  rate_limit: "100/minute"

features:
  enable_gui: true
  enable_api: true
  enable_spatial: true
  enable_vector_search: true
  enable_geo_server: false  # 开发环境默认关闭GeoServer