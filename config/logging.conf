[loggers]
keys=root,geoai,api,database,crawler

[handlers]
keys=consoleHandler,fileHandler,errorFileHandler

[formatters]
keys=simpleFormatter,detailedFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_geoai]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=geoai
propagate=0

[logger_api]
level=INFO
handlers=consoleHandler,fileHandler
qualname=geoai.api
propagate=0

[logger_database]
level=INFO
handlers=consoleHandler,fileHandler
qualname=geoai.database
propagate=0

[logger_crawler]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=geoai.crawler
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailedFormatter
args=('logs/geoai.log', 'a', 10485760, 10)  # 10MB per file, keep 10 backups

[handler_errorFileHandler]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailedFormatter
args=('logs/geoai_errors.log', 'a', 10485760, 5)

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(funcName)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S