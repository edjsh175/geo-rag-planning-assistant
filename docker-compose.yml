services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: geoai-postgis
    environment:
      POSTGRES_DB: ${GEOAI_POSTGRES_DB:-geoai_db}
      POSTGRES_USER: ${GEOAI_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${GEOAI_POSTGRES_PASSWORD:-change_me_postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GEOAI_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  geoserver:
    image: osgeo/geoserver:2.24.0
    container_name: geoai-geoserver
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-change_me_geoserver}
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./docker/geoserver/styles:/styles
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: geoai-mysql
    environment:
      MYSQL_DATABASE: ${GEOAI_MYSQL_DATABASE:-disaster_knowledge}
      MYSQL_ROOT_PASSWORD: ${GEOAI_MYSQL_ROOT_PASSWORD:-change_me_mysql}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend
    container_name: geoai-backend
    environment:
      DATABASE_URL: ${GEOAI_DATABASE_URL:-postgresql+asyncpg://postgres:change_me_postgres@postgis:5432/geoai_db}
      MYSQL_URL: ${GEOAI_MYSQL_URL:-mysql+aiomysql://root:change_me_mysql@mysql:3306/disaster_knowledge}
      GEOSERVER_URL: ${GEOAI_GEOSERVER_URL:-http://geoserver:8080/geoserver}
      REDIS_URL: ${GEOAI_REDIS_URL:-redis://:change_me_redis@redis:6379/0}
      MINIO_ENDPOINT: ${GEOAI_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${GEOAI_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${GEOAI_MINIO_SECRET_KEY:-change_me_minio}
      MINIO_BUCKET: ${GEOAI_MINIO_BUCKET:-geoai-assets}
      ZHIPU_API_KEY: ${GEOAI_ZHIPU_API_KEY:-}
      OPENAI_API_KEY: ${GEOAI_OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${GEOAI_DEEPSEEK_API_KEY:-}
      PUBLIC_DEMO_ENABLED: ${GEOAI_PUBLIC_DEMO_ENABLED:-true}
      DEMO_DAILY_AI_QUOTA_PER_VISITOR: ${GEOAI_DEMO_DAILY_AI_QUOTA_PER_VISITOR:-10}
      DEMO_DAILY_AI_QUOTA_PER_IP: ${GEOAI_DEMO_DAILY_AI_QUOTA_PER_IP:-30}
      DEMO_GLOBAL_DAILY_AI_QUOTA: ${GEOAI_DEMO_GLOBAL_DAILY_AI_QUOTA:-300}
      DEMO_QUOTA_TIMEZONE: ${GEOAI_DEMO_QUOTA_TIMEZONE:-Asia/Shanghai}
      DEMO_CONTACT_TEXT: ${GEOAI_DEMO_CONTACT_TEXT:-演示额度已用完，请联系项目作者获取更多体验额度。}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn Backend.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: frontend-runtime
    container_name: geoai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: geoai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --requirepass ${GEOAI_REDIS_PASSWORD:-change_me_redis} --appendonly yes

  minio:
    image: minio/minio
    container_name: geoai-minio
    environment:
      MINIO_ROOT_USER: ${GEOAI_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${GEOAI_MINIO_ROOT_PASSWORD:-change_me_minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    command: server /data --console-address ":9001"

volumes:
  postgis_data:
    driver: local
  mysql_data:
    driver: local
  geoserver_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: geoai-network


