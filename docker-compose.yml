services:
  # PostgreSQL + PostGIS + pgvector
  postgis:
    image: postgis/postgis:16-3.4
    container_name: geoai-postgis
    environment:
      POSTGRES_DB: geoai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # GeoServer (optional)
  geoserver:
    image: osgeo/geoserver:2.24.0
    container_name: geoai-geoserver
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./docker/geoserver/styles:/styles
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

  # MySQL metadata database
  mysql:
    image: mysql:8.0
    container_name: geoai-mysql
    environment:
      MYSQL_DATABASE: disaster_knowledge
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend (single entrypoint: Backend.main)
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend
    container_name: geoai-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgis:5432/geoai_db
      - MYSQL_URL=mysql+aiomysql://root:root@mysql:3306/disaster_knowledge
      - GEOSERVER_URL=http://geoserver:8080/geoserver
      - REDIS_URL=redis://:123456@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - MINIO_BUCKET=geoai-assets
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn Backend.main:app --host 0.0.0.0 --port 8000

  # Frontend proxy container
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: frontend
    container_name: geoai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Redis (optional)
  redis:
    image: redis:7-alpine
    container_name: geoai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --requirepass 123456 --appendonly yes

  # MinIO object storage
  minio:
    image: minio/minio
    container_name: geoai-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    command: server /data --console-address ":9001"

volumes:
  postgis_data:
    driver: local
  mysql_data:
    driver: local
  geoserver_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: geoai-network
