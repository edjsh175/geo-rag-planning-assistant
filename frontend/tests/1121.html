    (function() {

      // 测量功能实现
      let measureMode = null; // 'distance', 'area', or null

      // 距离测量按钮点击事件

      // 切换测量模式
      function toggleMeasureMode(mode) {
        // 如果当前已经是该模式，则退出
        if (measureMode === mode) {
          clearMeasurement();
          return;
        }
        
        // 清除之前的测量
        clearMeasurement();
        
        // 设置当前模式
        measureMode = mode;
        
        // 更新UI
        updateMeasureUI();
        
        // 初始化测量
        initMeasurement();
      }
      
      // 更新测量UI
      function updateMeasureUI() {
        // 重置所有按钮状态
        document.getElementById('distanceMeasureBtn').classList.remove('active');
        document.getElementById('areaMeasureBtn').classList.remove('active');
        
        // 设置当前模式按钮为激活状态
        if (measureMode === 'distance') {
          document.getElementById('distanceMeasureBtn').classList.add('active');
        } else if (measureMode === 'area') {
          document.getElementById('areaMeasureBtn').classList.add('active');
        }
      }
      
      // 初始化测量
      function initMeasurement() {
        // 创建屏幕空间事件处理器
        measureHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        
        // 设置鼠标点击事件
        measureHandler.setInputAction(function(click) {
          // 获取点击位置的地理坐标
          const cartesian = viewer.scene.pickPosition(click.position);
          if (!cartesian) return;
          
          // 添加测量点
          addMeasurePoint(cartesian);
          
          // 更新测量结果
          updateMeasurement();
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        
        // 设置鼠标移动事件（用于绘制临时线/面）
        measureHandler.setInputAction(function(movement) {
          if (measurePoints.length === 0) return;
          
          // 获取鼠标位置的地理坐标
          const cartesian = viewer.scene.pickPosition(movement.endPosition);
          if (!cartesian) return;
          
          // 更新临时测量结果
          updateTempMeasurement(cartesian);
        }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
      }
      
      // 添加测量点
      function addMeasurePoint(cartesian) {
        // 添加点到数组
        measurePoints.push(cartesian);
        
        // 创建点实体
        const pointEntity = viewer.entities.add({
          position: cartesian,
          point: {
            pixelSize: 8,
            color: Cesium.Color.RED,
            outlineColor: Cesium.Color.WHITE,
            outlineWidth: 2
          }
        });
        
        // 添加到测量实体数组
        measureEntities.push(pointEntity);
      }
      
      // 更新临时测量结果
      function updateTempMeasurement(cartesian) {
        // 清除之前的临时实体
        if (measureEntities.length > measurePoints.length) {
          viewer.entities.remove(measureEntities[measureEntities.length - 1]);
          measureEntities.pop();
        }
        
        // 创建临时点数组
        const tempPoints = [...measurePoints, cartesian];
        
        // 根据测量模式创建临时线或面
        if (measureMode === 'distance') {
          // 创建临时线
          const polylineEntity = viewer.entities.add({
            polyline: {
              positions: tempPoints,
              width: 2,
              material: Cesium.Color.YELLOW
            }
          });
          measureEntities.push(polylineEntity);
          
          // 计算临时距离
          const distance = calculateDistance(tempPoints);
          updateMeasureResult(distance, tempPoints.length - 1);
        } else if (measureMode === 'area') {
          // 创建临时面
          const polygonEntity = viewer.entities.add({
            polygon: {
              hierarchy: new Cesium.PolygonHierarchy(tempPoints),
              material: Cesium.Color.YELLOW.withAlpha(0.2),
              outline: true,
              outlineColor: Cesium.Color.YELLOW,
              outlineWidth: 2
            }
          });
          measureEntities.push(polygonEntity);
          
          // 计算临时面积
          const area = calculateArea(tempPoints);
          updateMeasureResult(area, tempPoints.length - 1);
        }
      }
      
      // 更新测量结果
      function updateMeasurement() {
        // 清除之前的非点实体
        while (measureEntities.length > measurePoints.length) {
          viewer.entities.remove(measureEntities[measurePoints.length]);
          measureEntities.splice(measurePoints.length, 1);
        }
        
        // 如果点数量不足，不绘制
        if (measurePoints.length < 2) {
          return;
        }
        
        // 根据测量模式创建线或面
        if (measureMode === 'distance') {
          // 创建线
          const polylineEntity = viewer.entities.add({
            polyline: {
              positions: measurePoints,
              width: 2,
              material: Cesium.Color.YELLOW
            }
          });
          measureEntities.push(polylineEntity);
          
          // 计算距离
          const distance = calculateDistance(measurePoints);
          updateMeasureResult(distance, measurePoints.length - 1);
        } else if (measureMode === 'area' && measurePoints.length >= 3) {
          // 创建面
          const polygonEntity = viewer.entities.add({
            polygon: {
              hierarchy: new Cesium.PolygonHierarchy(measurePoints),
              material: Cesium.Color.YELLOW.withAlpha(0.2),
              outline: true,
              outlineColor: Cesium.Color.YELLOW,
              outlineWidth: 2
            }
          });
          measureEntities.push(polygonEntity);
          
          // 计算面积
          const area = calculateArea(measurePoints);
          updateMeasureResult(area, measurePoints.length - 1);
        }
      }
      
      // 计算距离
      function calculateDistance(points) {
        let totalDistance = 0;
        const distances = [];
        
        for (let i = 0; i < points.length - 1; i++) {
          const distance = Cesium.Cartesian3.distance(points[i], points[i + 1]);
          distances.push(distance);
          totalDistance += distance;
        }
        
        return {
          total: totalDistance,
          segments: distances
        };
      }
      
      // 计算面积
      function calculateArea(points) {
        if (points.length < 3) return 0;
        
        // 使用多边形面积计算算法
        let area = 0;
        
        // 将Cartesian3转换为经纬度
        const positions = points.map(point => {
          const cartographic = Cesium.Cartographic.fromCartesian(point);
          return {
            lon: Cesium.Math.toDegrees(cartographic.longitude),
            lat: Cesium.Math.toDegrees(cartographic.latitude),
            alt: cartographic.height
          };
        });
        
        // 计算多边形面积（使用球面多边形面积算法）
        const R = 6371000; // 地球半径，单位米
        
        for (let i = 0; i < positions.length; i++) {
          const j = (i + 1) % positions.length;
          const lon1 = Cesium.Math.toRadians(positions[i].lon);
          const lon2 = Cesium.Math.toRadians(positions[j].lon);
          const lat1 = Cesium.Math.toRadians(positions[i].lat);
          const lat2 = Cesium.Math.toRadians(positions[j].lat);
          
          const dlon = lon2 - lon1;
          const dlat = lat2 - lat1;
          
          const a = Math.sin(dlat/2) * Math.sin(dlat/2) +
                  Math.cos(lat1) * Math.cos(lat2) *
                  Math.sin(dlon/2) * Math.sin(dlon/2);
          const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
          const d = R * c;
          
          // 累加面积
          area += (lon2 - lon1) * Math.sin((lat1 + lat2) / 2);
        }
        
        area = Math.abs(area) * R * R;
        
        return {
          total: area,
          segments: []
        };
      }
      
      // 更新测量结果显示
      function updateMeasureResult(measureData, segmentCount) {
        const resultEl = document.getElementById('measureResult');
        let html = '';
        
        if (measureMode === 'distance') {
          // 距离测量结果
          html += '<div>距离测量结果：</div>';

            html += `<div>第 ${index + 1} 段：${formatDistance(segment)}</div>`;
          });
          
          // 显示总距离
          html += `<div class="total-distance">总距离：${formatDistance(measureData.total)}</div>`;
        } else if (measureMode === 'area') {
          // 面积测量结果
          html += '<div>面积测量结果：</div>';
          html += `<div class="total-distance">总面积：${formatArea(measureData.total)}</div>`;
        }
        
        resultEl.innerHTML = html;
      }
      
      // 格式化距离显示
      function formatDistance(distance) {
        if (distance < 1000) {
          return distance.toFixed(2) + ' 米';
        } else {
          return (distance / 1000).toFixed(2) + ' 千米';
        }
      }
      
      // 格式化面积显示
      function formatArea(area) {
        if (area < 1000000) {
          return area.toLocaleString() + ' 平方米';
        } else {
          return (area / 1000000).toFixed(2) + ' 平方千米';
        }
      }
      
      // 清除测量
      function clearMeasurement() {
        // 重置测量模式
        measureMode = null;
        
        // 清除测量点
        measurePoints = [];
        
        // 移除测量实体
        measureEntities.forEach(entity => {
          viewer.entities.remove(entity);
        });
        measureEntities = [];
        
        // 移除事件处理器
        if (measureHandler) {
          measureHandler.destroy();
          measureHandler = null;
        }
        
        // 更新UI
        updateMeasureUI();
        
        // 清空测量结果
        document.getElementById('measureResult').innerHTML = '';
      }
      
      // 图层实例管理系统 - 重构为统一的图层集合数组
    let layers = [];
    
    // 图层ID常量定义
    const LAYER_IDS = {
      TDT_LAYER: 'tdtLayer',
      WIND_LAYER: 'windLayer',
      MODEL_LAYER: 'modelLayer',
      JSON_LAYER: 'jsonLayer',
      ENTITY_LAYER: 'entityLayer',
      EAST_CHINA_POLYGON: 'eastChinaPolygon',
      CITY_LINE: 'cityLine'
    };
    
    // 图层管理器重构实现
    const layerManager = {
      // 初始化图层管理器
      init: function() {
        // 加载保存的图层状态
        this.loadLayerStates();
        // 设置开关初始状态
        this.updateToggleStates();
        // 添加开关事件监听器
        this.addToggleListeners();
      },
      
      // 获取图层状态
      getLayerState: function(layerId) {
        return this.loadLayerStates()[layerId] || true;
      },
      
      // 加载保存的图层状态
      loadLayerStates: function() {
        try {
          const savedStates = localStorage.getItem('cesiumLayerStates');
          return savedStates ? JSON.parse(savedStates) : {
            [LAYER_IDS.TDT_LAYER]: true,
            [LAYER_IDS.WIND_LAYER]: false,
            [LAYER_IDS.MODEL_LAYER]: true,
            [LAYER_IDS.JSON_LAYER]: true,
            [LAYER_IDS.ENTITY_LAYER]: true,
            [LAYER_IDS.EAST_CHINA_POLYGON]: true,
            [LAYER_IDS.CITY_LINE]: true
          };
        } catch (error) {
          console.error('加载图层状态失败:', error);
          return {};
        }
      },
      
      // 保存图层状态到本地存储
      saveLayerStates: function() {
        try {
          const states = {};
          layers.forEach(layer => {
            states[layer.id] = layer.visible;
          });
          localStorage.setItem('cesiumLayerStates', JSON.stringify(states));
        } catch (error) {
          console.error('保存图层状态失败:', error);
        }
      },
      
      // 更新开关初始状态
      updateToggleStates: function() {
        const states = this.loadLayerStates();
        document.getElementById('tdtLayerToggle').checked = states[LAYER_IDS.TDT_LAYER] !== false;
        document.getElementById('windLayerToggle').checked = states[LAYER_IDS.WIND_LAYER] === true;
        document.getElementById('modelLayerToggle').checked = states[LAYER_IDS.MODEL_LAYER] !== false;
        document.getElementById('jsonLayerToggle').checked = states[LAYER_IDS.JSON_LAYER] !== false;
        document.getElementById('entityLayerToggle').checked = states[LAYER_IDS.ENTITY_LAYER] !== false;
      },
      
      // 添加开关事件监听器
      addToggleListeners: function() {
        // 统一的事件处理函数
        const handleLayerToggle = (layerId) => {
          return function(e) {
            const isVisible = e.target.checked;
            layerManager.toggleLayer(layerId, isVisible);
          };
        };
        
        // 天地图图层开关
        document.getElementById('tdtLayerToggle').addEventListener('change', handleLayerToggle(LAYER_IDS.TDT_LAYER));
        
        // 风效果图层开关
        document.getElementById('windLayerToggle').addEventListener('change', handleLayerToggle(LAYER_IDS.WIND_LAYER));
        
        // 模型图层开关
        document.getElementById('modelLayerToggle').addEventListener('change', handleLayerToggle(LAYER_IDS.MODEL_LAYER));
        
        // JSON数据图层开关
        document.getElementById('jsonLayerToggle').addEventListener('change', handleLayerToggle(LAYER_IDS.JSON_LAYER));
        
        // 实体要素图层开关
        document.getElementById('entityLayerToggle').addEventListener('change', handleLayerToggle(LAYER_IDS.ENTITY_LAYER));
      },
      
      // 添加图层到管理器
      addLayer: function(layerId, name, instance, visible = true) {
        // 检查是否已存在该图层
        const existingIndex = layers.findIndex(layer => layer.id === layerId);
        
        if (existingIndex !== -1) {
          // 更新现有图层
          layers[existingIndex] = {
            id: layerId,
            name: name,
            instance: instance,
            visible: visible
          };
        } else {
          // 添加新图层
          layers.push({
            id: layerId,
            name: name,
            instance: instance,
            visible: visible
          });
        }
        
        // 设置初始可见性
        this.setLayerVisibility(instance, visible);
      },
      
      // 切换图层显示/隐藏
      toggleLayer: function(layerId, isVisible) {
        const layer = layers.find(l => l.id === layerId);
        if (layer) {
          // 更新图层可见性
          this.setLayerVisibility(layer.instance, isVisible);
          // 更新图层状态
          layer.visible = isVisible;
          // 保存状态
          this.saveLayerStates();
        } else {
          // 处理特殊情况：如果是天地图图层，可能有多个实例
          if (layerId === LAYER_IDS.TDT_LAYER) {
            // 切换所有天地图图层
            layers.filter(l => l.id.startsWith(LAYER_IDS.TDT_LAYER)).forEach(l => {
              this.setLayerVisibility(l.instance, isVisible);
              l.visible = isVisible;
            });
            // 保存状态
            this.saveLayerStates();
          } else if (layerId === LAYER_IDS.JSON_LAYER) {
            // 切换所有JSON图层
            layers.filter(l => l.id.startsWith(LAYER_IDS.JSON_LAYER)).forEach(l => {
              this.setLayerVisibility(l.instance, isVisible);
              l.visible = isVisible;
            });
            // 保存状态
            this.saveLayerStates();
          }
        }
      },
      
      // 设置单个图层的可见性
      setLayerVisibility: function(layerInstance, isVisible) {
        if (!layerInstance) return;
        
        try {
          if (layerInstance.show !== undefined) {
            // ImageryLayer类型、实体类型或CesiumWind.WindLayer类型
            layerInstance.show = isVisible;
          } else if (layerInstance.primitiveType !== undefined || layerInstance._primitiveType !== undefined) {
            // Primitive类型
            layerInstance.show = isVisible;
          } else if (layerInstance.tileset !== undefined) {
            // Tileset类型
            layerInstance.tileset.show = isVisible;
          } else if (layerInstance.isDataSource !== undefined) {
            // DataSource类型
            layerInstance.isDataSource = isVisible;
          } else if (layerInstance.polygon || layerInstance.polyline || layerInstance.point) {
            // 实体要素类型
            layerInstance.show = isVisible;
          } else if (typeof layerInstance.setWindVisibility === 'function') {
            // CesiumWind.WindLayer类型（自定义方法）
            layerInstance.setWindVisibility(isVisible);
          } else if (typeof layerInstance.setVisible === 'function') {
            // 支持setVisible方法的图层类型
            layerInstance.setVisible(isVisible);
          } else {
            // 尝试直接设置show属性
            layerInstance.show = isVisible;
          }
        } catch (error) {
          console.error('设置图层可见性失败:', error, layerInstance);
        }
      },
      
      // 移除图层
      removeLayer: function(layerId) {
        layers = layers.filter(layer => layer.id !== layerId);
        this.saveLayerStates();
      },
      
      // 获取图层列表
      getLayers: function() {
        return layers;
      },
      
      // 根据ID获取图层
      getLayerById: function(layerId) {
        return layers.find(layer => layer.id === layerId);
      }
    };
    
    // 初始化图层管理器
    layerManager.init();
    
    // 将图层管理器和图层集合暴露到全局
    window.layerManager = layerManager;
    window.layers = layers;
    window.LAYER_IDS = LAYER_IDS;
    })();
  </script>
